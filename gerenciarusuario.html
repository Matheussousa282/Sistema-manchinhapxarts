<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👥 Gerenciar Usuários</title>
<style>
:root{
  --primary:#2f7fb3;--primary-h:#25658d;
  --success:#28a745;--danger:#dc3545;
  --yellow:#effa4f;--dark:#19191a;
  --gray:#333;--border:#dde3ee;--light:#f4f7fb;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Arial,sans-serif;background:var(--light);min-height:100vh;padding:28px 16px 60px;}

.page-header{max-width:700px;margin:0 auto 24px;display:flex;align-items:center;gap:10px;}
.page-header h1{font-size:22px;font-weight:800;color:var(--primary);display:flex;align-items:center;gap:8px;}

.layout{max-width:700px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:560px){.layout{grid-template-columns:1fr;}}

.box{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid var(--border);}
.box-title{
  font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--primary);margin-bottom:16px;
  display:flex;align-items:center;gap:6px;
}
.box-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* Lista de usuários */
.user-card{
  display:flex;align-items:center;gap:12px;
  padding:12px;background:#f7f9ff;border-radius:10px;
  margin-bottom:8px;border:1px solid var(--border);
}
.user-card:last-child{margin-bottom:0;}
.user-avatar{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),#4aa3df);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:#fff;flex-shrink:0;
}
.user-info{flex:1;}
.user-nome{font-size:14px;font-weight:700;color:var(--gray);}
.user-nivel{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:0.6px;margin-top:1px;}
.nivel-badge{
  display:inline-block;padding:2px 9px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:0.5px;
}
.nivel-admin{background:#fff3cd;color:#856404;}
.nivel-vendedor{background:#d4edda;color:#155724;}

.user-actions{display:flex;gap:6px;}
.btn-sm{
  padding:5px 10px;border-radius:6px;border:none;
  font-size:11px;font-weight:700;cursor:pointer;transition:opacity 0.2s;
}
.btn-sm:hover{opacity:0.8;}
.btn-alt{background:#ffc107;color:#000;}
.btn-del{background:var(--danger);color:#fff;}

/* Form cadastro */
.form-group{margin-bottom:12px;}
.form-group:last-of-type{margin-bottom:0;}
.form-group label{display:block;font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#aaa;margin-bottom:5px;}
.form-group input, .form-group select{
  width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;
  font-family:inherit;font-size:14px;color:var(--gray);background:#fafafa;
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;appearance:none;
}
.form-group input:focus,.form-group select:focus{
  border-color:var(--primary);box-shadow:0 0 0 3px rgba(47,127,179,0.12);background:#fff;
}

.btn-cadastrar{
  width:100%;margin-top:14px;padding:12px;
  background:var(--success);color:#fff;border:none;border-radius:8px;
  font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;
}
.btn-cadastrar:hover{background:#218838;transform:translateY(-1px);}
.btn-cadastrar.loading{opacity:0.7;pointer-events:none;}

/* Modal alterar senha */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:999;justify-content:center;align-items:center;
}
.modal-overlay.aberto{display:flex;}
.modal-box{
  background:#fff;border-radius:14px;padding:28px;width:90%;max-width:380px;
  box-shadow:0 16px 48px rgba(0,0,0,0.2);
}
.modal-box h3{font-size:16px;font-weight:800;color:var(--gray);margin-bottom:16px;}

/* Toast */
.toast{
  position:fixed;bottom:22px;right:22px;
  background:#fff;border-left:4px solid var(--success);
  border-radius:8px;padding:13px 18px;
  font-size:14px;font-weight:600;color:var(--gray);
  box-shadow:0 6px 24px rgba(0,0,0,0.15);z-index:9999;
  animation:toastIn 0.3s ease;max-width:280px;
}
.toast.error{border-color:var(--danger);}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="page-header">
  <h1>👥 Gerenciar Usuários</h1>
</div>

<div class="layout">
  <!-- Lista -->
  <div class="box">
    <div class="box-title">Usuários Cadastrados</div>
    <div id="listaUsuarios">
      <p style="color:#bbb;font-size:13px;text-align:center;padding:16px;">Carregando...</p>
    </div>
  </div>

  <!-- Cadastrar -->
  <div class="box">
    <div class="box-title">Novo Usuário</div>
    <div class="form-group">
      <label for="novoUsuario">Usuário</label>
      <input type="text" id="novoUsuario" placeholder="Nome de usuário">
    </div>
    <div class="form-group">
      <label for="novaSenha">Senha</label>
      <input type="password" id="novaSenha" placeholder="Senha segura">
    </div>
    <div class="form-group">
      <label for="novoNivel">Nível de Acesso</label>
      <select id="novoNivel">
        <option value="vendedor">Vendedor</option>
        <option value="admin">Administrador</option>
      </select>
    </div>
    <button class="btn-cadastrar" id="btnCadastrar" onclick="cadastrarUsuario()">+ Cadastrar Usuário</button>
  </div>
</div>

<!-- Modal alterar senha -->
<div class="modal-overlay" id="modalSenha">
  <div class="modal-box">
    <h3>🔑 Alterar Senha</h3>
    <input type="hidden" id="modalUserId">
    <div class="form-group">
      <label>Nova Senha</label>
      <input type="password" id="modalNovaSenha" placeholder="Nova senha">
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button onclick="salvarSenha()" style="flex:1;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;">Salvar</button>
      <button onclick="fecharModal()" style="flex:1;padding:10px;background:#eee;color:#333;border:none;border-radius:8px;font-weight:700;cursor:pointer;">Cancelar</button>
    </div>
  </div>
</div>

<script>
function showToast(msg, type='success'){
  const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}

// ─── Carregar usuários ───────────────────────────────────
async function carregarUsuarios(){
  try{
    const res  = await fetch('/api/usuarios');
    const list = await res.json();
    renderLista(list);
  }catch(e){
    document.getElementById('listaUsuarios').innerHTML = '<p style="color:#dc3545;font-size:13px;">Erro ao carregar usuários.</p>';
  }
}

function renderLista(usuarios){
  const cont = document.getElementById('listaUsuarios');
  if(!usuarios.length){ cont.innerHTML='<p style="color:#bbb;font-size:13px;text-align:center;padding:16px;">Nenhum usuário cadastrado.</p>'; return; }
  cont.innerHTML = usuarios.map(u=>`
    <div class="user-card">
      <div class="user-avatar">${u.usuario.charAt(0).toUpperCase()}</div>
      <div class="user-info">
        <div class="user-nome">${u.usuario}</div>
        <div class="user-nivel">
          <span class="nivel-badge nivel-${u.nivel||'vendedor'}">${u.nivel||'vendedor'}</span>
        </div>
      </div>
      <div class="user-actions">
        <button class="btn-sm btn-alt" onclick="abrirModal(${u.id},'${u.usuario}')">🔑 Senha</button>
        <button class="btn-sm btn-del" onclick="deletarUsuario(${u.id},'${u.usuario}')">🗑️</button>
      </div>
    </div>
  `).join('');
}

// ─── Cadastrar ───────────────────────────────────────────
async function cadastrarUsuario(){
  const usuario = document.getElementById('novoUsuario').value.trim();
  const senha   = document.getElementById('novaSenha').value.trim();
  const nivel   = document.getElementById('novoNivel').value;

  if(!usuario || !senha){ showToast('Preencha usuário e senha!','error'); return; }

  const btn = document.getElementById('btnCadastrar');
  btn.classList.add('loading'); btn.textContent = 'Cadastrando...';

  try{
    const res = await fetch('/api/usuarios',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({usuario,senha,nivel})
    });
    const data = await res.json();
    if(res.ok){
      showToast('✅ Usuário cadastrado!');
      document.getElementById('novoUsuario').value = '';
      document.getElementById('novaSenha').value   = '';
      carregarUsuarios();
    } else {
      showToast('❌ '+(data.error||'Erro ao cadastrar'),'error');
    }
  }catch(e){
    showToast('❌ Erro de conexão','error');
  } finally {
    btn.classList.remove('loading'); btn.textContent='+ Cadastrar Usuário';
  }
}

// ─── Deletar ─────────────────────────────────────────────
async function deletarUsuario(id, nome){
  if(!confirm(`Remover o usuário "${nome}"?`)) return;
  try{
    const res = await fetch(`/api/usuarios?id=${id}`,{method:'DELETE'});
    if(res.ok){ showToast('Usuário removido!'); carregarUsuarios(); }
    else showToast('Erro ao remover','error');
  }catch(e){ showToast('Erro de conexão','error'); }
}

// ─── Modal senha ─────────────────────────────────────────
function abrirModal(id, nome){
  document.getElementById('modalUserId').value = id;
  document.getElementById('modalNovaSenha').value = '';
  document.getElementById('modalSenha').classList.add('aberto');
}
function fecharModal(){ document.getElementById('modalSenha').classList.remove('aberto'); }

async function salvarSenha(){
  const id    = document.getElementById('modalUserId').value;
  const senha = document.getElementById('modalNovaSenha').value.trim();
  if(!senha){ showToast('Digite a nova senha!','error'); return; }
  try{
    const res = await fetch('/api/usuarios',{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id,senha})
    });
    if(res.ok){ showToast('✅ Senha alterada!'); fecharModal(); }
    else showToast('❌ Erro ao alterar senha','error');
  }catch(e){ showToast('Erro de conexão','error'); }
}

carregarUsuarios();
</script>
</body>
</html>
