<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerenciar Usuários</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    padding: 40px;
  }
  .container {
    background: #1e1e2f;
    color: #fff;
    padding: 30px;
    border-radius: 12px;
    width: 400px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  h2 { text-align: center; margin-bottom: 20px; }
  input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: none;
    outline: none;
  }
  button {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    margin-bottom: 10px;
    cursor: pointer;
    font-weight: bold;
  }
  .btn-cadastrar { background: #28a745; color: #fff; }
  .btn-voltar { background: #dc3545; color: #fff; }
  ul { list-style: none; padding: 0; }
  li {
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #2e2e40;
    padding: 8px 12px;
    border-radius: 6px;
  }
  li button { background: #ffc107; color: #000; width: auto; padding: 4px 8px; font-size: 14px; }
</style>
</head>
<body>

<div class="container">
  <h2>Gerenciar Usuários</h2>

  <ul id="listaUsuarios"></ul>

  <h3>Cadastrar Novo Usuário</h3>
  <input type="text" id="novoUsuario" placeholder="Usuário">
  <input type="password" id="novaSenha" placeholder="Senha">
  <button class="btn-cadastrar" onclick="cadastrarUsuario()">Cadastrar</button>
  <button class="btn-voltar" onclick="voltar()">Voltar</button>
</div>

<script>
// Inicializa localStorage
if(!localStorage.getItem('usuarios')){
  const defaultUsuarios = [{usuario:'admin', senha:'1234'}];
  localStorage.setItem('usuarios', JSON.stringify(defaultUsuarios));
}

// Função para exibir usuários
function mostrarUsuarios(){
  const lista = document.getElementById('listaUsuarios');
  const usuarios = JSON.parse(localStorage.getItem('usuarios'));
  lista.innerHTML = usuarios.map((u,i) => `
    <li>
      ${u.usuario} 
      <button onclick="alterarSenha(${i})">Alterar senha</button>
    </li>
  `).join('');
}

// Cadastrar usuário
function cadastrarUsuario(){
  const usuario = document.getElementById('novoUsuario').value.trim();
  const senha = document.getElementById('novaSenha').value.trim();
  if(!usuario || !senha){
    alert("Preencha usuário e senha!");
    return;
  }
  let usuarios = JSON.parse(localStorage.getItem('usuarios'));
  if(usuarios.find(u=>u.usuario===usuario)){
    alert("Usuário já existe!");
    return;
  }
  usuarios.push({usuario, senha});
  localStorage.setItem('usuarios', JSON.stringify(usuarios));
  alert("Usuário cadastrado!");
  document.getElementById('novoUsuario').value = '';
  document.getElementById('novaSenha').value = '';
  mostrarUsuarios();
}

// Alterar senha
function alterarSenha(index){
  const novaSenha = prompt("Digite a nova senha:");
  if(novaSenha){
    let usuarios = JSON.parse(localStorage.getItem('usuarios'));
    usuarios[index].senha = novaSenha;
    localStorage.setItem('usuarios', JSON.stringify(usuarios));
    alert("Senha alterada!");
    mostrarUsuarios();
  }
}

// Voltar (redireciona para painel)
function voltar(){
  window.location.href = "painel.html"; // ajuste o caminho do painel
}

// Inicializa lista ao carregar
mostrarUsuarios();
</script>

</body>
</html>
