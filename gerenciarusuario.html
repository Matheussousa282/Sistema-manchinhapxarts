<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👥 Usuários — Mpx Arts</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#3b82f6;--primary-dim:rgba(59,130,246,0.1);
  --success:#22c55e;--success-dim:rgba(34,197,94,0.1);
  --danger:#ef4444;--danger-dim:rgba(239,68,68,0.1);
  --warning:#f59e0b;
  --bg:#f1f4f9;--surface:#fff;--surface2:#f8fafc;
  --border:#e2e8f0;--text:#1e293b;--text-muted:#64748b;--text-xs:#94a3b8;
  --font:'Outfit',sans-serif;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);min-height:100vh;color:var(--text);}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px 60px;}

.page-header{margin-bottom:24px;}
.page-header h1{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-0.5px;display:flex;align-items:center;gap:10px;}
.page-header p{font-size:13.5px;color:var(--text-muted);margin-top:5px;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:580px){.grid{grid-template-columns:1fr;}}

.box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:0 1px 6px rgba(0,0,0,0.04);}
.box-title{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--primary);margin-bottom:18px;display:flex;align-items:center;gap:7px;}
.box-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* User list */
.user-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;transition:border-color 0.15s;}
.user-card:last-child{margin-bottom:0;}
.user-card:hover{border-color:#bfdbfe;}
.u-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#93c5fd);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;flex-shrink:0;}
.u-info{flex:1;min-width:0;}
.u-name{font-size:14px;font-weight:700;color:var(--text);}
.u-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.5px;margin-top:3px;}
.badge-admin{background:#fef3c7;color:#92400e;}
.badge-vendedor{background:#dcfce7;color:#166534;}
.u-actions{display:flex;gap:6px;}
.btn-sm{padding:6px 12px;border-radius:7px;border:none;font-family:var(--font);font-size:11.5px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.btn-alt{background:#fef3c7;color:#92400e;}
.btn-alt:hover{background:#fde68a;}
.btn-del{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(239,68,68,0.2);}
.btn-del:hover{background:var(--danger);color:#fff;}

/* Form */
.fg{margin-bottom:14px;}
.fg:last-of-type{margin-bottom:0;}
.fg label{display:block;font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.fg input,.fg select{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface2);outline:none;transition:border-color 0.18s,box-shadow 0.18s;appearance:none;}
.fg input:focus,.fg select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:#fff;}

.btn-create{width:100%;margin-top:16px;padding:12px;background:var(--success);color:#fff;border:none;border-radius:9px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s;box-shadow:0 2px 8px rgba(34,197,94,0.3);}
.btn-create:hover{background:#16a34a;transform:translateY(-1px);}
.btn-create:active{transform:translateY(0);}
.btn-create.loading{opacity:0.7;pointer-events:none;}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;justify-content:center;align-items:center;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:16px;padding:28px;width:90%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,0.2);border:1px solid var(--border);}
.modal h3{font-size:17px;font-weight:800;color:var(--text);margin-bottom:18px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.btn-modal-save{flex:1;padding:11px;background:var(--primary);color:#fff;border:none;border-radius:9px;font-family:var(--font);font-weight:700;cursor:pointer;transition:background 0.15s;}
.btn-modal-save:hover{background:#2563eb;}
.btn-modal-cancel{flex:1;padding:11px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);border-radius:9px;font-family:var(--font);font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn-modal-cancel:hover{background:var(--border);}

.toast{position:fixed;bottom:22px;right:22px;background:#fff;border-left:4px solid var(--success);border-radius:10px;padding:13px 18px;font-size:14px;font-weight:600;color:var(--text);box-shadow:0 8px 30px rgba(0,0,0,0.12);z-index:9999;max-width:300px;animation:tIn 0.25s ease;}
.toast.err{border-color:var(--danger);}
@keyframes tIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-header">
    <h1>👥 Gerenciar Usuários</h1>
    <p>Cadastre, edite e gerencie os acessos de usuários ao sistema.</p>
  </div>

  <div class="grid">
    <!-- Lista -->
    <div class="box">
      <div class="box-title">Usuários cadastrados</div>
      <div id="userList"><p style="color:var(--text-xs);font-size:13px;text-align:center;padding:16px;">Carregando...</p></div>
    </div>

    <!-- Cadastro -->
    <div class="box">
      <div class="box-title">Novo usuário</div>
      <div class="fg">
        <label for="inpUser">Nome de usuário</label>
        <input type="text" id="inpUser" placeholder="Ex: joao.vendas">
      </div>
      <div class="fg">
        <label for="inpPass">Senha</label>
        <input type="password" id="inpPass" placeholder="Mínimo 4 caracteres">
      </div>
      <div class="fg">
        <label for="inpNivel">Nível de acesso</label>
        <select id="inpNivel">
          <option value="vendedor">Vendedor — acesso básico</option>
          <option value="admin">Administrador — acesso total</option>
        </select>
      </div>
      <button class="btn-create" id="btnCreate" onclick="createUser()">+ Cadastrar Usuário</button>
    </div>
  </div>
</div>

<!-- Modal senha -->
<div class="overlay" id="modal">
  <div class="modal">
    <h3>🔑 Alterar senha</h3>
    <input type="hidden" id="mId">
    <div class="fg">
      <label>Nova senha</label>
      <input type="password" id="mPass" placeholder="Digite a nova senha">
    </div>
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal-save" onclick="savePass()">Salvar senha</button>
    </div>
  </div>
</div>

<script>
function toast(msg, type=''){const t=document.createElement('div');t.className=`toast${type?' '+type:''}`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}

async function loadUsers(){
  try{
    const res=await fetch('/api/usuarios');
    const list=await res.json();
    const c=document.getElementById('userList');
    if(!list.length){c.innerHTML='<p style="color:var(--text-xs);font-size:13px;text-align:center;padding:16px;">Nenhum usuário cadastrado.</p>';return;}
    c.innerHTML=list.map(u=>`
      <div class="user-card">
        <div class="u-av">${u.usuario.charAt(0).toUpperCase()}</div>
        <div class="u-info">
          <div class="u-name">${u.usuario}</div>
          <span class="u-badge badge-${u.nivel||'vendedor'}">${u.nivel||'vendedor'}</span>
        </div>
        <div class="u-actions">
          <button class="btn-sm btn-alt" onclick="openModal(${u.id})">🔑 Senha</button>
          <button class="btn-sm btn-del" onclick="deleteUser(${u.id},'${u.usuario}')">🗑️</button>
        </div>
      </div>`).join('');
  }catch{
    document.getElementById('userList').innerHTML='<p style="color:var(--danger);font-size:13px;text-align:center;padding:16px;">Erro ao carregar.</p>';
  }
}

async function createUser(){
  const u=document.getElementById('inpUser').value.trim();
  const s=document.getElementById('inpPass').value.trim();
  const n=document.getElementById('inpNivel').value;
  if(!u||!s){toast('Preencha usuário e senha!','err');return;}
  const btn=document.getElementById('btnCreate');
  btn.classList.add('loading');btn.textContent='Cadastrando...';
  try{
    const res=await fetch('/api/usuarios',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario:u,senha:s,nivel:n})});
    const d=await res.json();
    if(res.ok){toast('✅ Usuário cadastrado!');document.getElementById('inpUser').value='';document.getElementById('inpPass').value='';loadUsers();}
    else toast('❌ '+(d.error||'Erro'),'err');
  }catch{toast('❌ Erro de conexão','err');}
  finally{btn.classList.remove('loading');btn.textContent='+ Cadastrar Usuário';}
}

async function deleteUser(id,nome){
  if(!confirm(`Remover o usuário "${nome}"?`))return;
  try{
    const res=await fetch(`/api/usuarios?id=${id}`,{method:'DELETE'});
    if(res.ok){toast('Usuário removido!');loadUsers();}
    else toast('Erro ao remover','err');
  }catch{toast('Erro de conexão','err');}
}

function openModal(id){document.getElementById('mId').value=id;document.getElementById('mPass').value='';document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}

async function savePass(){
  const id=document.getElementById('mId').value;
  const s=document.getElementById('mPass').value.trim();
  if(!s){toast('Digite a nova senha!','err');return;}
  try{
    const res=await fetch('/api/usuarios',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,senha:s})});
    if(res.ok){toast('✅ Senha alterada!');closeModal();}
    else toast('❌ Erro ao alterar','err');
  }catch{toast('Erro de conexão','err');}
}

loadUsers();
</script>
</body>
</html>
