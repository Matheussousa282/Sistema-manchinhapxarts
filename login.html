<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mpx Arts — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0a0a0a;
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
}

/* Partículas */
.particles{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.particle{position:absolute;border-radius:50%;animation:floatUp linear infinite;}
@keyframes floatUp{
  0%  {transform:translateY(110vh) scale(0);opacity:0;}
  20% {opacity:1;}
  80% {opacity:0.6;}
  100%{transform:translateY(-10vh) scale(1.2) translateX(40px);opacity:0;}
}

/* Fundo grade */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,230,0,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,230,0,0.04) 1px,transparent 1px);
  background-size:50px 50px;
  z-index:0;
}

/* Card principal */
.card{
  position:relative;
  z-index:1;
  width:420px;
  background:rgba(10,10,10,0.92);
  border:1px solid rgba(255,230,0,0.3);
  border-radius:20px;
  padding:48px 40px 40px;
  box-shadow:
    0 0 40px rgba(255,220,0,0.15),
    0 24px 60px rgba(0,0,0,0.6);
  animation:fadeSlide 0.7s cubic-bezier(.23,1,.32,1) both;
}
@keyframes fadeSlide{
  from{opacity:0;transform:translateY(24px);}
  to  {opacity:1;transform:translateY(0);}
}

/* Logo */
.logo{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:36px;
  gap:10px;
}
.logo-mark{
  width:60px;height:60px;
  background:linear-gradient(135deg,#ffe600,#ffb300);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;
  font-weight:800;font-size:24px;color:#000;
  box-shadow:0 0 20px rgba(255,220,0,0.4);
}
.logo-name{
  font-family:'Syne',sans-serif;
  font-size:22px;font-weight:800;
  color:#ffe600;
  letter-spacing:1px;
  text-shadow:0 0 20px rgba(255,220,0,0.4);
}
.logo-sub{
  font-size:12px;color:#666;
  letter-spacing:2px;text-transform:uppercase;
}

/* Inputs */
.field{position:relative;margin-bottom:18px;}
.field label{
  display:block;font-size:11px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
  color:#666;margin-bottom:8px;
}
.field .icon{
  position:absolute;left:14px;bottom:12px;
  color:#ffe600;font-size:15px;
  text-shadow:0 0 8px rgba(255,220,0,0.5);
  pointer-events:none;
}
.field input{
  width:100%;
  padding:13px 14px 13px 42px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,230,0,0.2);
  border-radius:10px;
  color:#fff;font-size:15px;
  font-family:'DM Sans',sans-serif;
  outline:none;
  transition:border-color 0.25s,box-shadow 0.25s,background 0.25s;
}
.field input::placeholder{color:rgba(255,220,0,0.3);font-size:14px;}
.field input:focus{
  border-color:#ffe600;
  background:rgba(255,220,0,0.05);
  box-shadow:0 0 0 3px rgba(255,220,0,0.1);
}

/* Botão */
.btn-login{
  width:100%;margin-top:6px;
  padding:15px;
  background:linear-gradient(135deg,#ffe600,#ffb300);
  border:none;border-radius:10px;
  color:#000;font-size:16px;font-weight:700;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s,opacity 0.2s;
  box-shadow:0 4px 20px rgba(255,200,0,0.3);
  letter-spacing:0.3px;
}
.btn-login:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(255,200,0,0.45);
}
.btn-login:active{transform:translateY(0);}
.btn-login.loading{opacity:0.7;pointer-events:none;}
.btn-login.loading::after{
  content:'';display:inline-block;
  width:14px;height:14px;
  border:2px solid #000;border-top-color:transparent;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  margin-left:10px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Erro */
.erro{
  margin-top:16px;padding:12px 16px;
  background:rgba(220,53,69,0.12);
  border:1px solid rgba(220,53,69,0.3);
  border-radius:8px;
  color:#ff6b78;font-size:13px;font-weight:600;
  text-align:center;display:none;
  animation:shake 0.3s ease;
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  75%{transform:translateX(6px);}
}

/* Rodapé */
.card-footer{
  margin-top:28px;text-align:center;
  font-size:11px;color:#333;
  letter-spacing:0.5px;
}
.card-footer strong{color:#555;}

@media(max-width:460px){
  .card{width:94%;padding:36px 24px 28px;}
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="card">
  <div class="logo">
    <div class="logo-mark">MP</div>
    <div class="logo-name">Mpx Arts</div>
    <div class="logo-sub">Sistema de Vendas</div>
  </div>

  <form id="loginForm">
    <div class="field">
      <label for="username">Usuário</label>
      <i class="fa fa-user icon"></i>
      <input type="text" id="username" placeholder="Digite seu usuário" required autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <i class="fa fa-lock icon"></i>
      <input type="password" id="password" placeholder="Digite sua senha" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
    <div class="erro" id="msgErro">⚠️ Usuário ou senha incorretos!</div>
  </form>

  <div class="card-footer">
    Desenvolvido por <strong>MTScomputadores</strong>
  </div>
</div>

<script>
// ── Partículas ─────────────────────────────────────────
const pc = document.getElementById('particles');
for(let i=0;i<55;i++){
  const p = document.createElement('div');
  p.classList.add('particle');
  const size = Math.random()*5+3;
  p.style.cssText = `
    left:${Math.random()*100}%;
    width:${size}px;height:${size}px;
    background:rgba(255,${170+Math.floor(Math.random()*60)},0,${0.4+Math.random()*0.4});
    box-shadow:0 0 ${6+Math.random()*8}px rgba(255,200,0,0.7);
    animation-duration:${6+Math.random()*10}s;
    animation-delay:${Math.random()*6}s;
  `;
  pc.appendChild(p);
}

// ── Login via API ──────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async(e)=>{
  e.preventDefault();
  const btn  = document.getElementById('btnLogin');
  const erro = document.getElementById('msgErro');
  const usuario = document.getElementById('username').value.trim();
  const senha   = document.getElementById('password').value;

  btn.classList.add('loading');
  btn.textContent = 'Verificando';
  erro.style.display = 'none';

  try{
    const res  = await fetch('/api/usuarios', {
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    acao: 'login',
    usuario,
    senha
  })
});
    const data = await res.json();

    if(res.ok && data.ok){
      sessionStorage.setItem('isLoggedIn','true');
      sessionStorage.setItem('usuarioLogado', data.usuario);
      sessionStorage.setItem('nivelAcesso', data.nivel || 'vendedor');
      window.location.href = 'painel.html';
    } else {
      erro.style.display = 'block';
      erro.style.animation = 'none';
      setTimeout(()=>erro.style.animation='',10);
    }
  }catch(err){
    erro.textContent = '❌ Erro de conexão com o servidor.';
    erro.style.display = 'block';
  } finally {
    btn.classList.remove('loading');
    btn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
